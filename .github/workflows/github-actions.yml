name: Deploy to EC2 Ubuntu

on:
  push:
    branches:
      - main  # Triggers the pipeline when code is pushed to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Execute remote SSH commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Navigate to your project directory
            cd /var/www/html/your-project-directory

            # Fetch the latest code from GitHub
            git pull origin main

            # Install dependencies (Example for Node.js, adjust for your stack)
            # npm install --production

            # Restart your app/service (Example for PM2, Docker, or systemd)
            # pm2 restart all

